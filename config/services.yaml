# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    profile_images_directory: '%kernel.project_dir%/public/uploads/profile_images'
    # Face API configuration (wrapped in a parameter so it can be replaced in env or services)
    face_api_options:
        provider: '%env(FACE_API_PROVIDER)%'
        api_key: '%env(FACEPP_API_KEY)%'
        api_secret: '%env(FACEPP_API_SECRET)%'
        url: '%env(FACE_API_URL)%'
    groq_api_key: '%env(GROQ_API_KEY)%'
    groq_model: '%env(GROQ_MODEL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Security\LoginSuccessHandler:
        public: true
        autowire: true
        autoconfigure: true

    app.login_success_handler:
        class: App\Security\LoginSuccessHandler
        public: true
        autowire: true
        autoconfigure: true

    App\Service\GroqModerationService:
        arguments:
            $groqApiKey: '%groq_api_key%'
            $groqModel: '%groq_model%'
    # Face API client service
    App\Service\FaceApiClient:
        arguments:
            $client: '@http_client'
            $options: '%face_api_options%'
        public: false

    App\Service\DiagnosisService:
        arguments:
            $apiUrl: '%env(string:DIAGNOSIS_API_URL)%'
    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
